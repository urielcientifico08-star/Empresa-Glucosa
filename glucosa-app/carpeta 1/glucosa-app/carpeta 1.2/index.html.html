<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Monitor de Glucosa</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="menu">
  <button onclick="mostrarSeccion('inicio')">Inicio</button>
  <button onclick="mostrarSeccion('config')">Cuenta</button>
</div>

<div id="inicio">

  <h1>Monitor de Glucosa</h1>

  <div class="card">
    <p>Nivel actual:</p>
    <h2 id="glucosa">100 mg/dL</h2>
    <p id="promedio"></p>
  </div>

  <button onclick="simular()">Actualizar</button>
  <button onclick="emergencia()">🆘 Emergencia</button>
  <button onclick="contactarSoporte()">📞 Asesoramiento</button>

  <canvas id="grafica"></canvas>

  <h3>Tabla de referencia</h3>
  <table>
    <tr><th>Rango</th><th>Estado</th></tr>
    <tr><td>< 70</td><td>Bajo</td></tr>
    <tr><td>70 - 140</td><td>Normal</td></tr>
    <tr><td>140 - 200</td><td>Elevado</td></tr>
    <tr><td>200 - 300</td><td>Alto</td></tr>
    <tr><td>> 300</td><td>Crítico</td></tr>
  </table>

</div>

<div id="config" style="display:none">

  <h2>Registro</h2>
  <input id="nombre" placeholder="Nombre completo"><br>
  <input id="correo" placeholder="Correo"><br>
  <input id="pass" type="password" placeholder="Contraseña"><br>
  <button onclick="registrar()">Registrarse</button>

  <h2>Iniciar Sesión</h2>
  <input id="loginNombre" placeholder="Nombre"><br>
  <input id="loginPass" type="password" placeholder="Contraseña"><br>
  <button onclick="login()">Entrar</button>

  <h2>Opciones</h2>
  <button onclick="conectarBluetooth()">📡 Conectar dispositivo</button>
  <button onclick="contactarSoporte()">📞 Contactar soporte</button>

  <h2>Historial</h2>
  <ul id="historial"></ul>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="app.js"></script>

</body>
</html>
